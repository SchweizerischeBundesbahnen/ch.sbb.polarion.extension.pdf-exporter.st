---
name: System Tests (Polarion in Docker)
# Integration tests for pull requests: spin up Polarion + WeasyPrint in Docker
# (via the testcontainers harness in tests/run.py) and run the .st system tests
# against the latest released pdf-exporter extension. This is the merge gate, so
# PRs no longer depend on the availability of the Jenkins-side Polarion SUT.
#
# Required repository secret (Settings -> Secrets and variables -> Actions):
#     IO_JFROG_SBB_POLARION_TOKEN     - JFrog token (Maven X-JFrog-Art-Api header + Docker registry password)
#
# The Polarion image is pinned in env below; pdf-exporter and test-data versions are resolved to the latest release from sbb.jfrog.io at run time.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: system-tests-${{ github.ref }}
  cancel-in-progress: true
env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: temurin
  # admin-utility is pinned; pdf-exporter and test-data are resolved to their latest release at run time.
  TC_ADMIN_UTILITY_VERSION: 5.0.0
  # WeasyPrint service is always required; latest public image from GitHub Container Registry.
  TC_WEASYPRINT_SERVICE_IMAGE_NAME: ghcr.io/schweizerischebundesbahnen/weasyprint-service:latest
  # Polarion image pulled from sbb.jfrog.io, pinned here; bump the tag via PR to change the Polarion version under test.
  TC_POLARION_IMAGE_NAME: sbb.jfrog.io/polarion-docker/polarion/polarion:2606
jobs:
  system-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IO_JFROG_SBB_POLARION_TOKEN: ${{ secrets.IO_JFROG_SBB_POLARION_TOKEN }}
    steps:
      - name: 📄 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: 🐍 Set up Python from .tool-versions
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: .tool-versions
      - name: 🧱 Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - name: ☕ Set up JDK and Maven
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - name: 🔐 Configure Maven settings.xml (from repo .mvn/settings.xml)
        run: |
          mkdir -p "$HOME/.m2"
          cp "$GITHUB_WORKSPACE/.mvn/settings.xml" "$HOME/.m2/settings.xml"
      - name: 🐳 Log in to sbb.jfrog.io Docker registry
        run: |
          # Token-only auth (same token as the Maven X-JFrog-Art-Api header). For a JFrog access
          # token the username is not validated, so a fixed placeholder is enough.
          printf '%s' "$IO_JFROG_SBB_POLARION_TOKEN" | docker login sbb.jfrog.io -u polarion-ci --password-stdin
      - name: 🏷️ Resolve latest released extension versions
        run: |
          base="https://sbb.jfrog.io/artifactory/polarion-mvn/ch/sbb/polarion/extensions"
          resolve_latest() {
            artifact="$1"
            meta=$(curl -fsSL -H "X-JFrog-Art-Api: ${IO_JFROG_SBB_POLARION_TOKEN}" "${base}/${artifact}/maven-metadata.xml")
            version=$(printf '%s' "${meta}" | grep -oE '<release>[^<]+' | head -1 | sed 's/<release>//')
            if [ -z "${version}" ]; then
              version=$(printf '%s' "${meta}" | grep -oE '<latest>[^<]+' | head -1 | sed 's/<latest>//')
            fi
            if [ -z "${version}" ]; then
              echo "::error::Could not resolve latest version for ${artifact}" >&2
              return 1
            fi
            printf '%s' "${version}"
          }
          ext_version=$(resolve_latest "ch.sbb.polarion.extension.pdf-exporter")
          test_data_version=$(resolve_latest "ch.sbb.polarion.extension.test-data")
          echo "Resolved latest pdf-exporter version: ${ext_version}"
          echo "Resolved latest test-data version: ${test_data_version}"
          {
            echo "TC_EXTENSION_VERSION=${ext_version}"
            echo "TC_TEST_DATA_VERSION=${test_data_version}"
          } >> "${GITHUB_ENV}"
      - name: 🧱 Install dependencies
        run: uv sync --frozen
      - name: 🧪 Run system tests against Polarion in Docker
        run: uv run tox -e test
      - name: 📤 Upload test reports and generated/diff artifacts
        # Always upload so failures can be diagnosed: the output folder contains the generated
        # PDFs, the rendered page PNGs and the *_diff.png images highlighting visual mismatches.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: system-test-reports
          path: |
            TEST-*.xml
            test-data/output/**
          if-no-files-found: warn
          retention-days: 7
