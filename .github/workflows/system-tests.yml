---
name: System Tests (Polarion in Docker)
# Integration tests for pull requests: spin up Polarion + WeasyPrint in Docker
# (via the testcontainers harness in tests/run.py) and run the .st system tests
# against pinned extension versions (see env below). This is the merge gate, so
# PRs no longer depend on the availability of the Polarion SUT.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  # Run the suite on Renovate's own branches so branch-automerge bumps
  # (automergeType: branch in renovate.json) are exercised by system-tests
  # before Renovate fast-forwards them into main. Renovate opens no PR for
  # these, so the pull_request trigger above never fires for them.
  push:
    branches: ['renovate/**']
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: system-tests-${{ github.ref }}
  cancel-in-progress: true
env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: temurin
  TC_EXTENSION_VERSION: 13.3.1-SNAPSHOT
  TC_ADMIN_UTILITY_VERSION: 5.0.0
  TC_TEST_DATA_VERSION: 5.0.2
  TC_WEASYPRINT_SERVICE_IMAGE_NAME: ghcr.io/schweizerischebundesbahnen/weasyprint-service:69.0.0
  TC_POLARION_IMAGE_NAME: sbb.jfrog.io/polarion-docker/polarion/polarion:2606-0
jobs:
  system-tests:
    # Skip draft PRs (this container suite is expensive); still runs on manual workflow_dispatch.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IO_JFROG_SBB_POLARION_TOKEN: ${{ secrets.IO_JFROG_SBB_POLARION_TOKEN }}
    steps:
      - name: 📄 Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          persist-credentials: false
      - name: 🐳 Log in to sbb.jfrog.io Docker registry
        run: |
          # Token-only auth (same token as the Maven X-JFrog-Art-Api header). For a JFrog access
          # token the username is not validated, so a fixed placeholder is enough.
          printf '%s' "$IO_JFROG_SBB_POLARION_TOKEN" | docker login sbb.jfrog.io -u polarion --password-stdin
      - name: 🐍 Set up Python from .tool-versions
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version-file: .tool-versions
      - name: 🧱 Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      - name: ☕ Set up JDK and Maven
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - name: 🔐 Configure Maven settings.xml (from repo .mvn/settings.xml)
        run: |
          mkdir -p "$HOME/.m2"
          cp "$GITHUB_WORKSPACE/.mvn/settings.xml" "$HOME/.m2/settings.xml"
      - name: 🧱 Install dependencies (pre-pulling images in the background)
        # The testcontainers harness (tests/run.py) otherwise pulls the WeasyPrint and the large,
        # private Polarion image inside the test step, on the critical path. Kick both pulls off in
        # the background and let them run while `uv sync` installs dependencies; by the time the
        # harness starts the containers the images are already in the local docker cache, so its pull
        # is a no-op. `wait <pid>` then joins each pull and fails the step (via `set -e`) if it
        # errored — registry flap / expired token — surfacing the cause here rather than as an opaque
        # testcontainers error. Login above is required for the private Polarion image (WeasyPrint is
        # public on GHCR).
        run: |
          docker pull "$TC_WEASYPRINT_SERVICE_IMAGE_NAME" & wp_pid=$!
          docker pull "$TC_POLARION_IMAGE_NAME" & polarion_pid=$!
          uv sync --frozen
          wait "$wp_pid"
          wait "$polarion_pid"
      - name: 🧪 Run system tests against Polarion in Docker
        run: uv run tox -e test
      - name: 📤 Upload test reports and generated/diff artifacts
        # Always upload so failures can be diagnosed: the output folder contains the generated
        # PDFs, the rendered page PNGs and the *_diff.png images highlighting visual mismatches.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: system-test-reports
          path: |
            TEST-*.xml
            test-data/output/**
          if-no-files-found: warn
          retention-days: 7
